name: E2E Tests on Docs Instance

on:
  workflow_dispatch:
    inputs:
      instance:
        description: Instance to run e2e tests on
        required: false
        default: preprod
        type: choice
        options:
          - preprod
          - staging
      browsers:
        description: Browsers to run e2e tests on
        required: false
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all
      workers:
        description: Number of Playwright workers to use
        required: false
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"

concurrency:
  group: e2e-instance-${{ github.workflow }}-${{ inputs.instance }}-${{ inputs.browsers }}-${{ inputs.workers }}
  cancel-in-progress: false

jobs:
  e2e-on-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout docs-customized
        uses: actions/checkout@v5
        with:
          path: docs-customized

      - name: Checkout suitenumerique/docs
        uses: actions/checkout@v5
        with:
          repository: suitenumerique/docs
          ref: e2e/test-on-instance
          path: docs

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: yarn
          cache-dependency-path: |
            docs/src/frontend/yarn.lock
            docs/src/frontend/apps/e2e/yarn.lock

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('docs/src/frontend/yarn.lock', 'docs/src/frontend/apps/e2e/yarn.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install frontend dependencies
        run: |
          cd docs/src/frontend
          yarn install --frozen-lockfile

      - name: Add config file
        run: |
          cp docs-customized/docs-custom/${{ inputs.instance }}/.env.e2e docs/src/frontend/apps/e2e/.env.local

      - name: Restore last-run.json
        if: ${{ github.run_attempt > 1 }}
        uses: dawidd6/action-download-artifact@v6
        with:
          name: playwright-instance-last-run-${{ inputs.instance }}-${{ inputs.browsers }}
          path: docs/src/frontend/apps/e2e/test-results
          workflow: docs-e2e-instance.yml
          workflow_conclusion: ""
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Install Playwright browsers
        run: |
          cd docs/src/frontend/apps/e2e
          if [ "${{ inputs.browsers }}" = "all" ]; then
            yarn install-playwright chromium firefox webkit
          else
            yarn install-playwright ${{ inputs.browsers }}
          fi

      - name: Run e2e tests
        env:
          PLAYWRIGHT_HTML_OPEN: never
          PLAYWRIGHT_LIST_PRINT_STEPS: true
        run: |
          cd docs/src/frontend

          LAST_FAILED_FLAG=""
          if [ "${{ github.run_attempt }}" != "1" ]; then
            LAST_FAILED_FLAG="--last-failed"
          fi

          PROJECT_FLAGS=""
          if [ "${{ inputs.browsers }}" = "all" ]; then
            PROJECT_FLAGS="--project=chromium --project=firefox --project=webkit"
          else
            PROJECT_FLAGS="--project=${{ inputs.browsers }}"
          fi

          yarn e2e:test \
            $PROJECT_FLAGS \
            --workers=${{ inputs.workers }} \
            --reporter=list,html \
            --max-failures=0 \
            $LAST_FAILED_FLAG

      - name: Upload last-run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-instance-last-run-${{ inputs.instance }}-${{ inputs.browsers }}
          path: docs/src/frontend/apps/e2e/test-results/.last-run.json
          retention-days: 7

      - name: Find .last-run.json
        if: always()
        run: find docs/src/frontend/apps/e2e/test-results -name ".last-run.json" 2>/dev/null || echo "Not found"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-instance-report-${{ inputs.instance }}-${{ inputs.browsers }}
          path: docs/src/frontend/apps/e2e/report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-instance-results-${{ inputs.instance }}-${{ inputs.browsers }}
          path: docs/src/frontend/apps/e2e/test-results/
          retention-days: 7